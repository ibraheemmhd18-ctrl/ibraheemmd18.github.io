

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Arduino mBlock FULL</title>

<script src="https://cdn.jsdelivr.net/npm/blockly/blockly.min.js"></script>

<style>
body {margin:0; display:flex; height:100vh;}
#blocklyDiv {width:75%; height:100%;}
#panel {
  width:25%;
  background:#222;
  color:white;
  padding:10px;
}
button {
  width:100%;
  padding:10px;
  margin-top:10px;
}
textarea {
  width:100%;
  height:250px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="blocklyDiv"></div>

<div id="panel">
<h3>Arduino</h3>
<button onclick="generateCode()">Generate Code</button>
<button onclick="workspace.clear()">Clear Blocks</button>
<textarea id="code"></textarea>
</div>

<xml id="toolbox" style="display:none">

<!-- PIN -->
<category name="Pin" colour="#4C97FF">
  <block type="read_digital"></block>
  <block type="read_analog"></block>
  <block type="set_digital"></block>
  <block type="set_pwm"></block>
  <block type="set_servo"></block>
</category>

<!-- SERIAL -->
<category name="Serial" colour="#2ECC71">
  <block type="serial_write"></block>
  <block type="serial_available"></block>
  <block type="serial_read"></block>
</category>

<!-- SENSOR -->
<category name="Sensor" colour="#5DADE2">
  <block type="ultrasonic"></block>
</category>

<!-- CONTROL -->
<category name="Control" colour="#F39C12">
  <block type="start"></block>
  <block type="forever"></block>
  <block type="controls_if"></block>
  <block type="wait"></block>
</category>

<!-- DATA -->
<category name="Data" colour="#9B59B6">
  <block type="math_number"></block>
  <block type="text"></block>
</category>

</xml>

<script>

/* INIT */
var workspace = Blockly.inject('blocklyDiv',{
  toolbox:document.getElementById('toolbox'),
  trashcan:true
});

/* PIN BLOCKS */
Blockly.Blocks['read_digital'] = {
  init(){this.appendDummyInput().appendField("read digital").appendField(new Blockly.FieldNumber(2)); this.setOutput(true); this.setColour("#4C97FF");}
};
