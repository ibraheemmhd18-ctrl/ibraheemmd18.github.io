<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Arduino Blockly PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/blockly@10.3.1/blockly.min.js"></script>

<style>
body { margin:0; display:flex; height:100vh; }
#blocklyDiv { width:75%; height:100%; }
#panel {
  width:25%;
  background:#1e1e1e;
  color:white;
  padding:10px;
  overflow:auto;
}
button {
  width:100%;
  padding:10px;
  margin-top:10px;
}
textarea {
  width:100%;
  height:250px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="blocklyDiv"></div>

<div id="panel">
<h3>Arduino</h3>
<button onclick="generateCode()">GENERATE CODE</button>
<button onclick="workspace.clear()">CLEAR</button>
<textarea id="code"></textarea>
</div>

<xml id="toolbox" style="display:none">

<category name="Pin" colour="#4C97FF">
  <block type="set_digital"></block>
  <block type="read_analog"></block>
  <block type="servo"></block>
</category>

<category name="LCD" colour="#00ACC1">
  <block type="lcd_print"></block>
  <block type="lcd_clear"></block>
</category>

<category name="RFID" colour="#8E44AD">
  <block type="rfid_check"></block>
</category>

<category name="Control" colour="#FFAB19">
  <block type="forever"></block>
  <block type="controls_if">
    <mutation else="1"></mutation>
  </block>
  <block type="wait"></block>
</category>

</xml>

<script>
var workspace = Blockly.inject('blocklyDiv', {
  toolbox: document.getElementById('toolbox'),
  trashcan:true
});

/* PIN */
Blockly.Blocks['set_digital'] = {
  init:function(){
    this.appendDummyInput()
      .appendField("set pin 13")
      .appendField(new Blockly.FieldDropdown([["HIGH","HIGH"],["LOW","LOW"]]));
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

Blockly.Blocks['read_analog'] = {
  init:function(){
    this.appendDummyInput().appendField("read A0");
    this.setOutput(true);
    this.setColour("#4C97FF");
  }
};

Blockly.Blocks['servo'] = {
  init:function(){
    this.appendDummyInput().appendField("servo open door");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

/* LCD */
Blockly.Blocks['lcd_print'] = {
  init:function(){
    this.appendDummyInput()
      .appendField("LCD print")
      .appendField(new Blockly.FieldTextInput("Hello"));
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#00ACC1");
  }
};

Blockly.Blocks['lcd_clear'] = {
  init:function(){
    this.appendDummyInput().appendField("LCD clear");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#00ACC1");
  }
};

/* RFID */
Blockly.Blocks['rfid_check'] = {
  init:function(){
    this.appendDummyInput().appendField("RFID card detected");
    this.setOutput(true);
    this.setColour("#8E44AD");
  }
};

/* CONTROL */
Blockly.Blocks['forever'] = {
  init:function(){
    this.appendStatementInput("DO").appendField("forever");
    this.setColour("#FFAB19");
  }
};

Blockly.Blocks['wait'] = {
  init:function(){
    this.appendDummyInput()
      .appendField("wait 1 sec");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#FFAB19");
  }
};

/* CODE GENERATOR */
function generateCode() {
  let code = "";

  let blocks = workspace.getTopBlocks(true);

  blocks.forEach(b => {
    code += gen(b);
  });

  let final = `
#include <Wire.h>
#include <LiquidCrystal_I2C.h>
#include <SPI.h>
#include <MFRC522.h>
#include <Servo.h>

LiquidCrystal_I2C lcd(0x27,16,2);
MFRC522 mfrc522(10,9);
Servo servo1;

void setup(){
  lcd.init(); lcd.backlight();
  SPI.begin(); mfrc522.PCD_Init();
  servo1.attach(6);
}

void loop(){
${code}
}
`;

  document.getElementById("code").value = final;
}

function gen(block){
  let code = "";

  switch(block.type){

    case "set_digital":
      code += "digitalWrite(13,HIGH);\n";
      break;

    case "servo":
      code += "servo1.write(90);\n";
      break;

    case "lcd_print":
      code += 'lcd.print("Hello");\n';
      break;

    case "lcd_clear":
      code += "lcd.clear();\n";
      break;

    case "wait":
      code += "delay(1000);\n";
      break;

    case "forever":
      let inner="";
      let child=block.getInputTargetBlock("DO");
      while(child){
        inner += gen(child);
        child = child.getNextBlock();
      }
      code += "while(true){\n"+inner+"}\n";
      break;

    case "rfid_check":
      code += "mfrc522.PICC_IsNewCardPresent()";
      break;
  }

  if(block.getNextBlock()){
    code += gen(block.getNextBlock());
  }

  return code;
}
</script>

</body>
</html>
