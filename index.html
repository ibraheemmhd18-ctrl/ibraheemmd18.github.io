<!DOCTYPE html>
<html>
<head>
  <title>mBlock Style UI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
      background: #f5f5f5;
    }

    /* SIDEBAR */
    .sidebar {
      width: 230px;
      background: #fff;
      border-right: 2px solid #ddd;
      padding: 10px;
    }

    .menu div {
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      text-align: center;
    }

    .pin { background: #4a90e2; }
    .serial { background: #7ed321; }
    .inactive { background: #ccc; }

    /* BLOCKS */
    .block {
      padding: 10px;
      margin: 10px 0;
      border-radius: 20px;
      cursor: grab;
      color: white;
      width: fit-content;
    }

    .blue { background: #4a90e2; }
    .green { background: #7ed321; }

    select {
      border-radius: 10px;
      border: none;
      padding: 3px;
      margin: 0 5px;
    }

    /* WORKSPACE */
    .workspace {
      flex: 1;
      padding: 20px;
    }

    .dropzone {
      background: #fff;
      border: 2px dashed #ccc;
      height: 100%;
      padding: 10px;
      overflow-y: auto;
    }

    .placed-block {
      margin: 5px 0;
      padding: 10px;
      border-radius: 20px;
      color: white;
      width: fit-content;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="menu">
    <div class="pin" onclick="showCategory('pin')">Pin</div>
    <div class="serial inactive" onclick="showCategory('serial')">Serial</div>
  </div>

  <!-- PIN BLOCKS -->
  <div id="pinBlocks">

    <div class="block blue" draggable="true">
      set digital pin 
      <select>
        <option>0</option><option>1</option><option>2</option>
        <option>3</option><option>4</option><option>5</option>
        <option>6</option><option>7</option><option>8</option>
        <option>9</option><option>10</option>
      </select>
      output as 
      <select>
        <option>high</option>
        <option>low</option>
      </select>
    </div>

    <div class="block blue" draggable="true">
      read analog pin (A)
      <select>
        <option>0</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
      </select>
    </div>

  </div>

  <!-- SERIAL BLOCKS -->
  <div id="serialBlocks" style="display:none;">

    <div class="block green" draggable="true">
      write hello to serial port
    </div>

    <div class="block green" draggable="true">
      readable bytes from serial port
    </div>

    <div class="block green" draggable="true">
      read a byte from serial port
    </div>

  </div>

</div>

<!-- WORKSPACE -->
<div class="workspace">
  <div class="dropzone" id="workspace">
    <h3>Drag blocks here 👇</h3>
  </div>
</div>

<script>
  // SWITCH CATEGORY
  function showCategory(cat) {
    document.getElementById('pinBlocks').style.display = (cat === 'pin') ? 'block' : 'none';
    document.getElementById('serialBlocks').style.display = (cat === 'serial') ? 'block' : 'none';
  }

  // DRAG SYSTEM
  const blocks = document.querySelectorAll('.block');
  const workspace = document.getElementById('workspace');

  blocks.forEach(block => {
    block.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/html', block.outerHTML);
    });
  });

  workspace.addEventListener('dragover', e => {
    e.preventDefault();
  });

  workspace.addEventListener('drop', e => {
    e.preventDefault();

    const data = e.dataTransfer.getData('text/html');

    const newBlock = document.createElement('div');
    newBlock.className = 'placed-block';
    newBlock.innerHTML = data;

    workspace.appendChild(newBlock);
  });
</script>

</body>
</html>
