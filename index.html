<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>mBlock Clone</title>

<script src="https://unpkg.com/blockly/blockly.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
}

#topbar {
  background: #00aaff;
  color: white;
  padding: 10px;
}

button {
  margin-right: 10px;
  padding: 6px 12px;
  border: none;
  background: white;
  cursor: pointer;
}

#blocklyDiv {
  height: 90vh;
  width: 100%;
}
</style>
</head>

<body>

<div id="topbar">
  <button onclick="upload()">⬆ Upload</button>
  <button onclick="live()">⚡ Live</button>
  <button onclick="clearBlocks()">🗑 Clear</button>
</div>

<div id="blocklyDiv"></div>

<xml id="toolbox" style="display:none">

<!-- EVENTS -->
<category name="Events" colour="#FFD500">
  <block type="start"></block>
</category>

<!-- PIN -->
<category name="Pin" colour="#4C97FF">
  <block type="read_digital"></block>
  <block type="read_analog"></block>
  <block type="set_digital"></block>
  <block type="set_pwm"></block>
  <block type="servo"></block>
</category>

<!-- SERIAL -->
<category name="Serial Port" colour="#00C853">
  <block type="serial_write"></block>
  <block type="serial_available"></block>
  <block type="serial_read"></block>
</category>

<!-- DATA -->
<category name="Data" colour="#A64DFF">
  <block type="map"></block>
  <block type="constrain"></block>
</category>

<!-- SENSOR -->
<category name="Sensor" colour="#5CC8FF">
  <block type="ultrasonic"></block>
  <block type="timer"></block>
  <block type="reset_timer"></block>
</category>

</xml>

<script>

var workspace = Blockly.inject('blocklyDiv', {
  toolbox: document.getElementById('toolbox'),
  trashcan: true
});


// ===== EVENTS =====
Blockly.Blocks['start'] = {
  init: function() {
    this.appendDummyInput().appendField("when Arduino Uno starts up");
    this.setNextStatement(true);
    this.setColour("#FFD500");
  }
};

// ===== PIN BLOCKS =====
Blockly.Blocks['read_digital'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("read digital pin")
      .appendField(new Blockly.FieldNumber(9), "PIN");
    this.setOutput(true);
    this.setColour("#4C97FF");
  }
};

Blockly.Blocks['read_analog'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("read analog pin A")
      .appendField(new Blockly.FieldNumber(0), "PIN");
    this.setOutput(true);
    this.setColour("#4C97FF");
  }
};

Blockly.Blocks['set_digital'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("set digital pin")
      .appendField(new Blockly.FieldNumber(9), "PIN")
      .appendField("output as")
      .appendField(new Blockly.FieldDropdown([
        ["HIGH","HIGH"],
        ["LOW","LOW"]
      ]), "STATE");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

Blockly.Blocks['set_pwm'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("set PWM")
      .appendField(new Blockly.FieldNumber(5), "PIN")
      .appendField("output as")
      .appendField(new Blockly.FieldNumber(0), "VALUE");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

Blockly.Blocks['servo'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("set servo pin")
      .appendField(new Blockly.FieldNumber(9), "PIN")
      .appendField("angle")
      .appendField(new Blockly.FieldNumber(90), "ANGLE");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

// ===== SERIAL =====
Blockly.Blocks['serial_write'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("write")
      .appendField(new Blockly.FieldTextInput("hello"), "TEXT")
      .appendField("to serial port");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#00C853");
  }
};

Blockly.Blocks['serial_available'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("readable bytes from serial port");
    this.setOutput(true);
    this.setColour("#00C853");
  }
};

Blockly.Blocks['serial_read'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("read a byte from serial port");
    this.setOutput(true);
    this.setColour("#00C853");
  }
};

// ===== DATA =====
Blockly.Blocks['map'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("map")
      .appendField(new Blockly.FieldNumber(0))
      .appendField("from 1-100 to 1-1000");
    this.setOutput(true);
    this.setColour("#A64DFF");
  }
};

Blockly.Blocks['constrain'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("constrain")
      .appendField(new Blockly.FieldNumber(0))
      .appendField("between 1-100");
    this.setOutput(true);
    this.setColour("#A64DFF");
  }
};

// ===== SENSOR =====
Blockly.Blocks['ultrasonic'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("read ultrasonic trig")
      .appendField(new Blockly.FieldNumber(1))
      .appendField("echo")
      .appendField(new Blockly.FieldNumber(1));
    this.setOutput(true);
    this.setColour("#5CC8FF");
  }
};

Blockly.Blocks['timer'] = {
  init: function() {
    this.appendDummyInput().appendField("timer");
    this.setOutput(true);
    this.setColour("#5CC8FF");
  }
};

Blockly.Blocks['reset_timer'] = {
  init: function() {
    this.appendDummyInput().appendField("reset timer");
    this.setPreviousStatement(true);
    this.setColour("#5CC8FF");
  }
};


// ===== BUTTONS =====
function upload() {
  alert("Upload mode (like mBlock)");
}

function live() {
  alert("Live mode activated");
}

function clearBlocks() {
  workspace.clear();
}

</script>

</body>
</html>
