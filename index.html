<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Arduino Blockly FIXED</title>

<!-- IMPORTANT: correct Blockly -->
<script src="https://unpkg.com/blockly/blockly.min.js"></script>

<style>
body { margin:0; display:flex; height:100vh; }
#blocklyDiv { width:75%; height:100%; }
#panel { width:25%; background:#222; color:white; padding:10px; }
button { width:100%; padding:10px; margin-top:10px; }
textarea { width:100%; height:200px; }
</style>
</head>

<body>

<div id="blocklyDiv"></div>

<div id="panel">
<h3>Arduino</h3>
<button onclick="generateCode()">Generate Code</button>
<button onclick="workspace.clear()">Clear Blocks</button>
<textarea id="code"></textarea>
</div>

<!-- TOOLBOX -->
<xml id="toolbox" style="display:none">

<category name="Pin" colour="#4C97FF">
  <block type="set_digital"></block>
  <block type="set_servo"></block>
</category>

<category name="Control" colour="#F39C12">
  <block type="forever"></block>
</category>

</xml>

<script>

// ✅ INIT (IMPORTANT FIX)
var workspace = Blockly.inject('blocklyDiv', {
  toolbox: document.getElementById('toolbox'),
  trashcan: true
});


// 🔵 BLOCKS
Blockly.Blocks['set_digital'] = {
  init(){
    this.appendDummyInput()
      .appendField("set pin 13 HIGH");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

Blockly.Blocks['set_servo'] = {
  init(){
    this.appendDummyInput()
      .appendField("servo open");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

Blockly.Blocks['forever'] = {
  init(){
    this.appendStatementInput("DO")
      .appendField("forever");
    this.setColour("#F39C12");
  }
};


// 🔥 GENERATOR
function generateCode(){

let code = "";
let blocks = workspace.getTopBlocks(true);

blocks.forEach(b => {
  code += gen(b);
});

let final = `
#include <Servo.h>

Servo servo1;

void setup(){    								   
  pinMode(13, OUTPUT);
  servo1.attach(9);
}

void loop(){
${code}
}
`;

document.getElementById("code").value = final;
}


// 🔥 BLOCK → CODE
function gen(block){

let code = "";

switch(block.type){

case "set_digital":
code += "digitalWrite(13, HIGH);\n";
break;

case "set_servo":
code += "servo1.write(90);\n";
break;

case "forever":
let inner = "";
let child = block.getInputTargetBlock("DO");

while(child){
inner += gen(child);
child = child.getNextBlock();
}

code += "while(true){\n" + inner + "}\n";
break;

}

if(block.getNextBlock()){
code += gen(block.getNextBlock());
}

return code;
}

</script>

</body>
</html>
