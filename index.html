<!DOCTYPE html>
<html>
<head>
  <title>its possibe its arduino mblock full...</title>
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <style>
    body { margin:0; font-family:Arial; }
    #blocklyDiv { height:100vh; width:75%; float:left; }
    #side {
      width:25%; height:100vh; float:right;
      background:#222; color:white; padding:10px;
    }
    button {
      width:100%; padding:12px; margin:5px 0;
      font-size:16px;
    }
    textarea {
      width:100%; height:200px;
    }
  </style>
</head>

<body>

<div id="blocklyDiv"></div>

<div id="side">
  <h2>Arduino</h2>
  <button onclick="generateCode()">Generate Code</button>
  <button onclick="clearBlocks()">Clear Blocks</button>
  <textarea id="code"></textarea>
</div>

<!-- TOOLBOX -->
<xml id="toolbox" style="display:none">

  <!-- EVENTS -->
  <category name="Events" colour="#FFD500">
    <block type="start"></block>
  </category>

  <!-- CONTROL -->
  <category name="Control" colour="#FFAB19">
    <block type="controls_if"></block>
    <block type="controls_repeat_ext"></block>
    <block type="controls_whileUntil"></block>
    <block type="controls_for"></block>
    <block type="controls_flow_statements"></block>
  </category>

  <!-- PINS -->
  <category name="Pins" colour="#4C97FF">
    <block type="digital_read"></block>
    <block type="digital_write"></block>
    <block type="analog_read"></block>
    <block type="pwm_write"></block>
    <block type="servo_write"></block>
  </category>

  <!-- SENSOR -->
  <category name="Sensor" colour="#5CB1D6">
    <block type="ultrasonic"></block>
  </category>

  <!-- SERIAL -->
  <category name="Serial" colour="#59C059">
    <block type="serial_write"></block>
    <block type="serial_read"></block>
  </category>

  <!-- DATA -->
  <category name="Variables" colour="#FF8C1A" custom="VARIABLE"></category>

  <!-- OPERATORS -->
  <category name="Operators" colour="#40BF4A">
    <block type="math_number"></block>
    <block type="math_arithmetic"></block>
    <block type="logic_compare"></block>
  </category>

</xml>

  toolbox: document.getElementById('toolbox')

    this.appendDummyInput().appendField("when Arduino starts");

    this.setColour("#FFD500");
  }

  }
};
