<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>mBlock Full System</title>

<!-- ✅ STABLE BLOCKLY -->
<script src="https://cdn.jsdelivr.net/npm/blockly@10.3.1/blockly.min.js"></script>

<style>
body { margin:0; display:flex; height:100vh; }

#blocklyDiv {
  width:80%;
  height:100%;
}

#controls {
  width:20%;
  background:#222;
  color:white;
  padding:10px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="blocklyDiv"></div>

<div id="controls">
  <h3>Arduino</h3>
  <button onclick="alert('Upload Mode')">UPLOAD</button>
  <button onclick="alert('Live Mode')">LIVE</button>
  <button onclick="workspace.clear()">CLEAR</button>
</div>

<xml id="toolbox" style="display:none">

<!-- EVENTS -->
<category name="Events" colour="#FFD500">
  <block type="start"></block>
</category>

<!-- PIN -->
<category name="Pin" colour="#4C97FF">
  <block type="read_digital"></block>
  <block type="set_digital"></block>
  <block type="set_pwm"></block>
</category>

<!-- SERIAL -->
<category name="Serial" colour="#00C853">
  <block type="serial_write"></block>
</category>

<!-- SENSOR -->
<category name="Sensor" colour="#5DADE2">
  <block type="ultrasonic"></block>
</category>

<!-- DATA -->
<category name="Data" colour="#9B59B6">
  <block type="map_value"></block>
</category>

<!-- CONTROL -->
<category name="Control" colour="#FFAB19">
  <block type="controls_repeat_ext"></block>
  <block type="forever"></block>
  <block type="controls_if"></block>
  <block type="wait_seconds"></block>
</category>

<!-- OPERATORS -->
<category name="Operators" colour="#40BF4A">
  <block type="math_number"></block>
  <block type="math_arithmetic"></block>
  <block type="logic_compare"></block>
</category>

<!-- VARIABLES -->
<category name="Variables" colour="#FF8C1A" custom="VARIABLE"></category>

</xml>

<script>
var workspace = Blockly.inject('blocklyDiv', {
  toolbox: document.getElementById('toolbox'),
  trashcan:true
});

/* EVENTS */
Blockly.Blocks['start'] = {
  init:function(){
    this.appendDummyInput().appendField("when Arduino starts");
    this.setNextStatement(true);
    this.setColour("#FFD500");
  }
};

/* PIN */
Blockly.Blocks['read_digital'] = {
  init:function(){
    this.appendDummyInput()
    .appendField("read digital pin")
    .appendField(new Blockly.FieldNumber(9,0,13));
    this.setOutput(true);
    this.setColour("#4C97FF");
  }
};

Blockly.Blocks['set_digital'] = {
  init:function(){
    this.appendDummyInput()
    .appendField("set pin")
    .appendField(new Blockly.FieldNumber(9))
    .appendField("as")
    .appendField(new Blockly.FieldDropdown([["HIGH","HIGH"],["LOW","LOW"]]));
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

Blockly.Blocks['set_pwm'] = {
  init:function(){
    this.appendDummyInput()
    .appendField("set PWM pin")
    .appendField(new Blockly.FieldNumber(5))
    .appendField("value")
    .appendField(new Blockly.FieldNumber(0,0,255));
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

/* SERIAL */
Blockly.Blocks['serial_write'] = {
  init:function(){
    this.appendDummyInput()
    .appendField("write")
    .appendField(new Blockly.FieldTextInput("hello"))
    .appendField("to serial");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#00C853");
  }
};

/* SENSOR */
Blockly.Blocks['ultrasonic'] = {
  init:function(){
    this.appendDummyInput()
    .appendField("ultrasonic trig")
    .appendField(new Blockly.FieldNumber(1))
    .appendField("echo")
    .appendField(new Blockly.FieldNumber(1));
    this.setOutput(true);
    this.setColour("#5DADE2");
  }
};

/* DATA */
Blockly.Blocks['map_value'] = {
  init:function(){
    this.appendDummyInput().appendField("map value");
    this.setOutput(true);
    this.setColour("#9B59B6");
  }
};

/* CONTROL */
Blockly.Blocks['wait_seconds'] = {
  init:function(){
    this.appendDummyInput()
    .appendField("wait")
    .appendField(new Blockly.FieldNumber(1))
    .appendField("seconds");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#FFAB19");
  }
};

Blockly.Blocks['forever'] = {
  init:function(){
    this.appendStatementInput("DO").appendField("forever");
    this.setColour("#FFAB19");
  }
};

</script>

</body>
</html>
