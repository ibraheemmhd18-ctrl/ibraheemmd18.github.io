<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>mBlock FULL Clone</title>

<script src="https://unpkg.com/blockly/blockly.min.js"></script>

<style>
body {margin:0; display:flex; height:100vh;}
#blocklyDiv {width:75%; height:100%;}
#panel {width:25%; background:#222; color:white; padding:10px;}
button {width:100%; padding:10px; margin-top:10px;}
textarea {width:100%; height:250px;}
</style>
</head>

<body>

<div id="blocklyDiv"></div>

<div id="panel">
<h3>Arduino</h3>
<button onclick="generateCode()">Generate Code</button>
<button onclick="workspace.clear()">Clear Blocks</button>
<textarea id="code"></textarea>
</div>

<xml id="toolbox" style="display:none">

<!-- PIN -->
<category name="Pin" colour="#4C97FF">
  <block type="set_digital"></block>
  <block type="set_pwm"></block>
  <block type="set_servo"></block>
  <block type="read_digital"></block>
  <block type="read_analog"></block>
  <block type="pulse"></block>
</category>

<!-- CONTROL -->
<category name="Control" colour="#F39C12">
  <block type="controls_if"></block>
  <block type="controls_repeat_ext"></block>
  <block type="forever"></block>
  <block type="wait"></block>
</category>

<!-- OPERATORS -->
<category name="Operators" colour="#27AE60">
  <block type="math_number"></block>
  <block type="math_arithmetic"></block>
  <block type="logic_compare"></block>
</category>

<!-- DATA -->
<category name="Data" colour="#9B59B6">
  <block type="text"></block>
  <block type="variables_get"></block>
  <block type="variables_set"></block>
</category>

<!-- SERIAL -->
<category name="Serial" colour="#2ECC71">
  <block type="serial_write"></block>
  <block type="serial_read"></block>
</category>

<!-- SENSOR -->
<category name="Sensor" colour="#5DADE2">
  <block type="ultrasonic"></block>
</category>

<!-- EVENTS -->
<category name="Events" colour="#F1C40F">
  <block type="start"></block>
</category>

</xml>

<script>

/* INIT */
var workspace = Blockly.inject('blocklyDiv',{
  toolbox:document.getElementById('toolbox'),
  trashcan:true
});

/* PIN */
Blockly.Blocks['set_digital'] = {
  init(){this.appendDummyInput().appendField("set pin 13 HIGH"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#4C97FF");}
};
Blockly.Blocks['set_pwm'] = {
  init(){this.appendDummyInput().appendField("PWM pin 5 value 128"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#4C97FF");}
};
Blockly.Blocks['set_servo'] = {
  init(){this.appendDummyInput().appendField("servo pin 9 angle 90"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#4C97FF");}
};
Blockly.Blocks['read_digital'] = {
  init(){this.appendDummyInput().appendField("read digital pin 2"); this.setOutput(true); this.setColour("#4C97FF");}
};
Blockly.Blocks['read_analog'] = {
  init(){this.appendDummyInput().appendField("read analog A0"); this.setOutput(true); this.setColour("#4C97FF");}
};
Blockly.Blocks['pulse'] = {
  init(){this.appendDummyInput().appendField("read pulse pin 7"); this.setOutput(true); this.setColour("#4C97FF");}
};

/* CONTROL */
Blockly.Blocks['forever'] = {
  init(){this.appendStatementInput("DO").appendField("forever"); this.setColour("#F39C12");}
};
Blockly.Blocks['wait'] = {
  init(){this.appendDummyInput().appendField("wait 1 sec"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#F39C12");}
};

/* EVENTS */
Blockly.Blocks['start'] = {
  init(){this.appendDummyInput().appendField("when Arduino starts"); this.setNextStatement(true); this.setColour("#F1C40F");}
};

/* SERIAL */
Blockly.Blocks['serial_write'] = {
  init(){this.appendDummyInput().appendField("write hello"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#2ECC71");}
};
Blockly.Blocks['serial_read'] = {
  init(){this.appendDummyInput().appendField("read serial"); this.setOutput(true); this.setColour("#2ECC71");}
};

/* SENSOR */
Blockly.Blocks['ultrasonic'] = {
  init(){this.appendDummyInput().appendField("ultrasonic trig 2 echo 3"); this.setOutput(true); this.setColour("#5DADE2");}
};

/* GENERATE CODE */
function generateCode(){

let code="";
let blocks=workspace.getTopBlocks(true);

blocks.forEach(b=>{code+=gen(b);});

let final=`
#include <Servo.h>
Servo servo1;

void setup(){
Serial.begin(9600);
servo1.attach(9);
pinMode(13,OUTPUT);
}

void loop(){
${code}
}
`;

document.getElementById("code").value=final;
}

function gen(block){

let code="";

switch(block.type){

case "set_digital":
code+="digitalWrite(13,HIGH);\n";
break;

case "set_pwm":
code+="analogWrite(5,128);\n";
break;

case "set_servo":
code+="servo1.write(90);\n";
break;

case "serial_write":
code+='Serial.println("ASsalamualikum sir .... welcome to Serial monitor Serial.print ln");\n';
break;

case "wait":
code+="delay(1000);\n";
break;

case "forever":
let inner="";
let child=block.getInputTargetBlock("DO");
while(child){
inner+=gen(child);
child=child.getNextBlock();
}
code+="while(true){\n"+inner+"}\n";
break;

}

if(block.getNextBlock()){
code+=gen(block.getNextBlock());
}

return code;
}

</script>

</body>
</html>
