<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Blockly Fix</title>

<!-- ✅ DIFFERENT CDN (IMPORTANT FIX) -->
<script src="https://cdn.jsdelivr.net/npm/blockly@10.3.1/blockly.min.js"></script>

<style>
body { margin:0; }
#blocklyDiv { height:100vh; width:100%; }
</style>
</head>

<body>

<div id="blocklyDiv"></div>

<xml id="toolbox" style="display:none">
  <category name="Test" colour="#ff0000">
    <block type="controls_repeat_ext"></block>
  </category>
</xml>

<script>
Blockly.inject('blocklyDiv', {
  toolbox: document.getElementById('toolbox')
});
</script>

</body>
</html>
