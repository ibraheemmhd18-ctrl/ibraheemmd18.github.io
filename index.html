<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Red mBlock Style Arduino</title>

  <script src="https://unpkg.com/blockly/blockly.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
      background: #111;
    }

    /* 🔴 LEFT TOOLBOX PANEL */
    #toolbox {
      height: 100%;
      width: 20%;
      background: #1a0000;
      color: white;
      padding: 10px;
      box-sizing: border-box;
      border-right: 2px solid red;
    }

    /* 🧩 BLOCKLY AREA */
    #blocklyDiv {
      height: 100%;
      width: 60%;
    }

    /* 📟 CODE AREA */
    #codeArea {
      width: 20%;
      background: #000;
      color: #ff3b3b;
      padding: 10px;
      box-sizing: border-box;
      border-left: 2px solid red;
      font-size: 13px;
      overflow: auto;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: red;
      border: none;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: darkred;
    }
  </style>
</head>

<body>

<!-- 🧩 BLOCKLY -->
<div id="blocklyDiv"></div>

<!-- 📟 CODE OUTPUT -->
<div id="codeArea">
  <h3>Arduino Code 🔥</h3>
  <pre id="code"></pre>
  <button onclick="generateCode()">Generate Code</button>
</div>

<!-- TOOLBOX -->
<xml id="toolbox" style="display: none">

  <category name="🔌 Pins" colour="red">
    <block type="pin_write"></block>
    <block type="pin_read"></block>
  </category>

  <category name="🔁 Control" colour="darkred">
    <block type="controls_if"></block>
    <block type="controls_repeat_ext"></block>
  </category>

  <category name="➗ Math" colour="red">
    <block type="math_number"></block>
    <block type="math_arithmetic"></block>
  </category>

</xml>

<script>
/* =========================
   🔴 BLOCKLY INIT
========================= */

var workspace = Blockly.inject('blocklyDiv', {
  toolbox: document.getElementById('toolbox'),
  scrollbars: true,
  trashcan: true
});

/* =========================
   🔌 CUSTOM BLOCKS
========================= */

Blockly.Blocks['pin_write'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("set pin")
      .appendField(new Blockly.FieldDropdown([
        ["13","13"],
        ["12","12"],
        ["11","11"],
        ["10","10"]
      ]), "PIN")
      .appendField("to")
      .appendField(new Blockly.FieldDropdown([
        ["HIGH","HIGH"],
        ["LOW","LOW"]
      ]), "STATE");

    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("red");
  }
};

Blockly.Blocks['pin_read'] = {
  init: function() {
    this.appendDummyInput()
      .appendField("read pin")
      .appendField(new Blockly.FieldDropdown([
        ["A0","A0"],
        ["A1","A1"],
        ["2","2"],
        ["3","3"]
      ]), "PIN");

    this.setOutput(true, "Number");
    this.setColour("darkred");
  }
};

/* =========================
   ⚙️ CODE GENERATOR
========================= */

Blockly.JavaScript['pin_write'] = function(block) {
  var pin = block.getFieldValue('PIN');
  var state = block.getFieldValue('STATE');
  return `digitalWrite(${pin}, ${state});\n`;
};

Blockly.JavaScript['pin_read'] = function(block) {
  var pin = block.getFieldValue('PIN');
  return [`digitalRead(${pin})`, Blockly.JavaScript.ORDER_NONE];
};

/* =========================
   📟 GENERATE CODE
========================= */

function generateCode() {
  var code = Blockly.JavaScript.workspaceToCode(workspace);

  document.getElementById("code").innerText =
`void setup() {
  pinMode(13, OUTPUT);
}

void loop() {
${code}
}`;
}
</script>

</body>
</html>
