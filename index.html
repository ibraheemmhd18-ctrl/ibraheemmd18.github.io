<!DOCTYPE html>
<html>
<head>
  <title>mBlock Pin UI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #f3f3f3;
      padding: 10px;
    }

    .category {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      text-align: center;
    }

    .pin { background: #4a90e2; }
    .other { background: #ccc; }

    /* Blocks */
    .block {
      background: #4a90e2;
      color: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 20px;
      cursor: grab;
      width: fit-content;
    }

    select {
      border-radius: 10px;
      border: none;
      padding: 3px;
    }

    /* Workspace */
    .workspace {
      flex: 1;
      background: #fafafa;
      padding: 20px;
    }
  </style>
</head>

<body>

<!-- LEFT SIDEBAR -->
<div class="sidebar">

  <div class="category pin">Pin</div>

  <!-- ONLY REQUIRED BLOCKS -->

  <div class="block" draggable="true">
    set digital pin 
    <select>
      <option>9</option>
    </select>
    output as 
    <select>
      <option>high</option>
      <option>low</option>
    </select>
  </div>

  <div class="block" draggable="true">
    read analog pin (A)
    <select>
      <option>0</option>
      <option>1</option>
      <option>2</option>
      <option>3</option>
      <option>4</option>
      <option>5</option>
    </select>
  </div>

</div>

<!-- RIGHT WORK AREA -->
<div class="workspace" id="workspace">
  <h2>Drag blocks here 👇</h2>
</div>

<script>
  const blocks = document.querySelectorAll('.block');
  const workspace = document.getElementById('workspace');

  blocks.forEach(block => {
    block.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text', block.outerHTML);
    });
  });

  workspace.addEventListener('dragover', e => {
    e.preventDefault();
  });

  workspace.addEventListener('drop', e => {
    e.preventDefault();
    const data = e.dataTransfer.getData('text');
    workspace.innerHTML += data;
  });
</script>

</body>
</html>
