<!DOCTYPE html>
<html>
<head>
  <title>mBlock Style</title>
  <style>
    body {
      background-color: #2c3e50;
      font-family: Arial;
      color: white;
      text-align: center;
    }

    .block {
      background: #3498db;
      padding: 15px;
      margin: 10px auto;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 4px #2980b9;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🚀 My mBlock Website</h1>

<div class="block">When Green Flag Clicked</div>
<div class="block">Move 10 Steps</div>
<div class="block">Turn Right 15°</div>
<div class="block">Say "Hello!"</div>

</body>
</html>
