<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>mBlock Style Arduino</title>

<script src="https://unpkg.com/blockly/blockly.min.js"></script>

<style>
body {margin:0; display:flex; height:100vh; font-family:sans-serif;}
#blocklyDiv {width:75%; height:100%;}
#panel {
  width:25%;
  background:#1f1f1f;
  color:white;
  padding:12px;
}
button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#444;
  color:red;
  border:none;
}
textarea {
  width:100%;
  height:230px;
  margin-top:10px;
  background:#111;
  color:#0f0;
}
</style>
</head>

<body>

<div id="blocklyDiv"></div>

<div id="panel">
<h3>Arduino</h3>
<button onclick="generateCode()">Generate Code</button>
<button onclick="workspace.clear()">Clear Blocks</button>
<textarea id="code"></textarea>
</div>

<xml id="toolbox" style="display:none">

<category name="Pin" colour="#4C97FF">
  <block type="read_digital"></block>
  <block type="read_analog"></block>
  <block type="set_digital"></block>
  <block type="set_pwm"></block>
  <block type="set_servo"></block>
</category>

<category name="Control" colour="#F39C12">
  <block type="controls_if"></block>
  <block type="controls_repeat_ext"></block>
  <block type="forever"></block>
  <block type="wait"></block>
</category>

<category name="Operators" colour="#27AE60">
  <block type="math_number"></block>
  <block type="logic_compare"></block>
  <block type="math_arithmetic"></block>
</category>

<category name="Data" colour="#9B59B6" custom="VARIABLE"></category>

</xml>

<script>

// INIT
var workspace = Blockly.inject('blocklyDiv',{
  toolbox: document.getElementById('toolbox'),
  trashcan:true
});

// PIN LIST (0–13)
let pinList = [];
for(let i=0;i<=13;i++){ pinList.push([i.toString(), i.toString()]); }

// ANALOG LIST
let analogList = [["A0","0"],["A1","1"],["A2","2"],["A3","3"],["A4","4"],["A5","5"]];

// READ DIGITAL
Blockly.Blocks['read_digital'] = {
  init(){
    this.appendDummyInput()
      .appendField("read digital pin")
      .appendField(new Blockly.FieldDropdown(pinList), "PIN");
    this.setOutput(true);
    this.setColour("#4C97FF");
  }
};

// READ ANALOG
Blockly.Blocks['read_analog'] = {
  init(){
    this.appendDummyInput()
      .appendField("read analog pin")
      .appendField(new Blockly.FieldDropdown(analogList), "PIN");
    this.setOutput(true);
    this.setColour("#4C97FF");
  }
};

// SET DIGITAL
Blockly.Blocks['set_digital'] = {
  init(){
    this.appendDummyInput()
      .appendField("set digital pin")
      .appendField(new Blockly.FieldDropdown(pinList), "PIN")
      .appendField("output as")
      .appendField(new Blockly.FieldDropdown([
        ["HIGH","HIGH"],
        ["LOW","LOW"]
      ]), "STATE");

    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

// PWM
Blockly.Blocks['set_pwm'] = {
  init(){
    this.appendDummyInput()
      .appendField("set PWM pin")
      .appendField(new Blockly.FieldDropdown(pinList), "PIN")
      .appendField("value")
      .appendField(new Blockly.FieldNumber(0,0,255), "VALUE");

    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

// SERVO
Blockly.Blocks['set_servo'] = {
  init(){
    this.appendDummyInput()
      .appendField("set servo pin")
      .appendField(new Blockly.FieldDropdown(pinList), "PIN")
      .appendField("angle")
      .appendField(new Blockly.FieldNumber(90,0,180), "ANGLE");

    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

// FOREVER
Blockly.Blocks['forever'] = {
  init(){
    this.appendStatementInput("DO").appendField("forever");
    this.setColour("#F39C12");
  }
};

// WAIT
Blockly.Blocks['wait'] = {
  init(){
    this.appendDummyInput()
      .appendField("wait")
      .appendField(new Blockly.FieldNumber(1,0), "TIME")
      .appendField("seconds");

    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#F39C12");
  }
};

// GENERATE CODE
function generateCode(){

let code="";
let blocks=workspace.getTopBlocks(true);

blocks.forEach(b=>{ code+=gen(b); });

let final=`
#include <Servo.h>
Servo servo1;

void setup(){
Serial.begin(9600);
servo1.attach(9);
}

void loop(){
${code}
}
`;

document.getElementById("code").value=final;
}

// GENERATOR
function gen(block){

let code="";

switch(block.type){

case "set_digital":
code+=`digitalWrite(${block.getFieldValue("PIN")}, ${block.getFieldValue("STATE")});\n`;
break;

case "set_pwm":
code+=`analogWrite(${block.getFieldValue("PIN")}, ${block.getFieldValue("VALUE")});\n`;
break;

case "set_servo":
code+=`servo1.write(${block.getFieldValue("ANGLE")});\n`;
break;

case "wait":
code+=`delay(${block.getFieldValue("TIME")*1000});\n`;
break;

case "forever":
let inner="";
let child=block.getInputTargetBlock("DO");
while(child){
inner+=gen(child);
child=child.getNextBlock();
}
code+="while(true){\n"+inner+"}\n";
break;

}

if(block.getNextBlock()){
code+=gen(block.getNextBlock());
}

return code;
}

</script>

</body>
</html>
