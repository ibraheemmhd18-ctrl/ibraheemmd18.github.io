<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>mBlock Stable</title>

<script src="https://unpkg.com/blockly/blockly.min.js"></script>

<style>
body { margin:0; }
#blocklyDiv { height:100vh; width:100%; }
</style>
</head>

<body>

<div id="blocklyDiv"></div>

<xml id="toolbox" style="display:none">

<!-- EVENTS -->
<category name="Events" colour="#FFD500">
  <block type="controls_if"></block>
</category>

<!-- CONTROL -->
<category name="Control" colour="#FFAB19">
  <block type="controls_repeat_ext"></block>
  <block type="controls_whileUntil"></block>
  <block type="controls_for"></block>
</category>

<!-- OPERATORS -->
<category name="Operators" colour="#40BF4A">
  <block type="math_number"></block>
  <block type="math_arithmetic"></block>
  <block type="logic_compare"></block>
</category>

<!-- DATA -->
<category name="Data" colour="#9B59B6">
  <block type="text"></block>
</category>

<!-- VARIABLES -->
<category name="Variables" colour="#FF8C1A" custom="VARIABLE"></category>

<!-- MY BLOCKS -->
<category name="My Blocks" colour="#FF6680" custom="PROCEDURE"></category>

<!-- EMPTY SAFE CATEGORIES -->
<category name="Pins" colour="#4C97FF"></category>
<category name="Serial" colour="#2ECC71"></category>
<category name="Sensor" colour="#5DADE2"></category>

</xml>

<script>

// SAFE LOAD
window.onload = function(){
  Blockly.inject('blocklyDiv',{
    toolbox: document.getElementById('toolbox'),
    trashcan:true,
    scrollbars:true
  });
};

</script>

</body>
</html>
